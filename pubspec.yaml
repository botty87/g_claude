name: g_claude
description: "Desktop GUI for Claude Code (macOS first)."
publish_to: 'none'
version: 2.0.0-beta.1+5

environment:
  sdk: ^3.11.5
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1
  flutter_hooks: ^0.21.3+1

  # DI
  get_it: ^9.2.0
  injectable: ^2.5.0

  # Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  equatable: ^2.0.7

  # Routing
  auto_route: ^11.1.0

  # Logging
  talker_flutter: ^5.0.0
  talker_bloc_logger: ^5.0.0

  # Fonts + icons
  google_fonts: ^6.2.1
  material_symbols_icons: ^4.2928.1

  # Desktop
  window_manager: ^0.5.0
  tray_manager: ^0.5.0
  hotkey_manager: ^0.2.3
  desktop_drop: ^0.6.0

  # FS / paths
  path_provider: ^2.1.5
  path: ^1.9.1
  collection: ^1.19.0
  file_picker: ^11.0.2

  # Persistence
  shared_preferences: ^2.3.3
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.24

  # Syntax highlighting + code viewer
  re_highlight: ^0.0.3
  re_editor: ^0.8.0

  # Markdown rendering
  flutter_markdown_plus: ^1.0.7
  markdown: ^7.3.0

  # PDF viewer
  pdfrx: ^2.2.24

  # Localization
  easy_localization: ^3.0.8

  # HTTP server (PermissionServer — sessione successiva)
  shelf: ^1.4.2
  shelf_router: ^1.1.4

  # AI tooling — agent-driven UI inspection
  marionette_flutter: ^0.6.0

  # Terminal (PTY + xterm rendering)
  xterm: ^4.0.0
  flutter_pty: ^0.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Testing
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  fake_async: ^1.3.1

  build_runner: ^2.7.0
  injectable_generator: ^2.7.0
  drift_dev: ^2.20.0
  freezed: ^3.1.0
  json_serializable: ^6.8.0
  auto_route_generator: ^10.5.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  macos:
    generate: true
    image_path: "assets/branding/app_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/branding/
